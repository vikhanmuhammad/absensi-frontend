<aside class="sidebar">
  <div class="sidebar-brand"><span class="dot"></span>Absensi</div>
  <nav>
    @for (item of navItems(); track item.path) {
      <a [routerLink]="item.path" routerLinkActive="active" class="nav-link">
        {{ item.label }}
        @if (item.path === '/notifikasi' && notifications.unreadCount() > 0) {
          <span class="nav-badge">{{ notifications.unreadCount() }}</span>
        }
      </a>
    }
  </nav>
</aside>

<header class="topbar">
  <div class="topbar-title">{{ pageTitle }}</div>
  <div class="topbar-user">
    <div class="avatar">{{ avatarInitial() }}</div>
    <span>{{ displayName() }}</span>
    <button class="logout-btn" type="button" (click)="logout()">Keluar</button>
  </div>
</header>

<main class="content">
  <router-outlet></router-outlet>
</main>
