@if (mobileOpen()) {
  <div class="sidebar-backdrop" (click)="closeMobileSidebar()"></div>
}

<aside class="sidebar">
  <div class="sidebar-brand">
    <span class="dot"></span>
    <span class="brand-text">Absensi</span>
  </div>
  <nav>
    @for (group of navGroups(); track group.label) {
      @if (group.children.length === 1) {
        <!-- Single item: render langsung tanpa expand -->
        <a [routerLink]="group.children[0].path" routerLinkActive="active" class="nav-link" [title]="group.children[0].label">
          <app-icon [name]="group.children[0].icon" [size]="22" class="nav-icon"></app-icon>
          <span class="nav-label">{{ group.children[0].label }}</span>
        </a>
      } @else {
        <!-- Group: parent expandable — nav-children always in DOM for CSS hover popup when collapsed -->
        <div class="nav-group-wrap"
             [class.open]="isGroupOpen(group.label)"
             [class.has-active-child]="hasActiveChild(group)"
             [style.--popup-top.px]="hoverGroupTop()"
             (mouseenter)="onGroupHover($event, group.label)"
             (mouseleave)="onGroupLeave()">
          <button class="nav-link nav-group-parent"
                  [class.open]="isGroupOpen(group.label)"
                  [class.active]="hasActiveChild(group)"
                  (click)="onGroupClick($event, group)"
                  [title]="group.label">
            <app-icon [name]="group.icon" [size]="22" class="nav-icon"></app-icon>
            <span class="nav-label">{{ group.label }}</span>
            <app-icon name="chevron-down" [size]="16" class="nav-chevron"></app-icon>
          </button>
          <div class="nav-children">
            @for (child of group.children; track child.path) {
              <a [routerLink]="child.path" routerLinkActive="active" class="nav-link nav-child" [title]="child.label">
                <span class="nav-label">{{ child.label }}</span>
              </a>
            }
          </div>
        </div>
      }
    }
  </nav>
</aside>

<header class="topbar">
  <div class="topbar-left">
    <button class="icon-btn sidebar-toggle" type="button" (click)="toggleSidebar()" aria-label="Buka/tutup menu">
      <app-icon name="menu" class="show-mobile" [size]="22"></app-icon>
      <app-icon [name]="collapsed() ? 'chevron-right' : 'chevron-left'" class="show-desktop" [size]="22"></app-icon>
    </button>
    <div class="topbar-title">{{ pageTitle }}</div>
  </div>
  <div class="topbar-right">
    <button class="icon-btn notification-bell" routerLink="/notifikasi" title="Notifikasi">
      <app-icon name="bell" [size]="20"></app-icon>
      @if (notifications.unreadCount() > 0) {
        <span class="notification-badge">{{ notifications.unreadCount() }}</span>
      }
    </button>
  </div>
  <div class="topbar-user">
    <div class="avatar">{{ avatarInitial() }}</div>
    <span class="user-name">{{ displayName() }}</span>
    <button class="logout-btn" type="button" (click)="logout()" title="Keluar">
      <app-icon name="logout" [size]="18"></app-icon>
      <span class="logout-text">Keluar</span>
    </button>
  </div>
</header>

<main class="content">
  <router-outlet></router-outlet>
</main>
